<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For Lily 🩷</title>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Chewy&family=Quicksand:wght@400;600&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- 3D Canvas Background -->
    <canvas id="bg-canvas"></canvas>

    <!-- Main Content Overlay -->
    <div id="app">
        <!-- Couple Animation Container -->
        <div id="couple-container"
            style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 50;">
            <svg id="couple-svg" style="position: absolute; width: 100%; height: 100%;">
                <line id="couple-line" x1="0" y1="0" x2="0" y2="0" stroke="#ff4d6d" stroke-width="3"
                    stroke-dasharray="10, 5" />
            </svg>
            <!-- Couple Images: Using object-fit cover/contain via style or class if needed -->
            <!-- Adding border-radius: 50% for circular look often looks better for profiles, but keeping square for now as requested -->
            <img id="img-her" src="her.png" class="couple-img sway-anim"
                style="position: absolute; top: 20px; left: 20px; width: 100px; height: 100px; object-fit: cover; border-radius: 50%; border: 3px solid #ff4d6d; transition: left 1s ease, top 1s ease;">
            <img id="img-his" src="his.png" class="couple-img sway-anim-delayed"
                style="position: absolute; top: 20px; right: 20px; width: 100px; height: 100px; object-fit: cover; border-radius: 50%; border: 3px solid #ff4d6d; transition: right 1s ease, top 1s ease;">
        </div>

        <!-- Intro Screen -->
        <div id="screen-intro" class="screen active">
            <h1 class="title">Hello my devi <span class="girl-name">Lily</span>!</h1>
            <p class="subtitle">Apke liye chotu sa gift...</p>
            <img src="sticker1.png" alt="Shinchan" class="sticker float-anim" style="max-width: 150px;">
            <br>
            <button class="btn-primary" onclick="startGame()">Pup Ready? 🩷</button>
        </div>

        <!-- Facts Screen (Replaces Quiz) -->
        <div id="screen-facts" class="screen hidden">
            <div class="score-board">Fact <span id="fact-count">1</span>/5 🩷</div>
            <div class="card">
                <h2 id="fact-question">Question loading...</h2>

                <div id="fact-reveal-area" class="hidden">
                    <h1 class="fact-answer" id="fact-answer">Answer</h1>
                    <p class="fact-conclusion" id="fact-conclusion">Conclusion</p>
                </div>

                <div class="options">
                    <button id="btn-reveal" class="btn-primary" onclick="revealFact()">Reveal 🫣</button>
                    <button id="btn-next-fact" class="btn-secondary hidden" onclick="nextFact()">Next ❤️</button>
                </div>
            </div>
            <img id="quiz-sticker" src="zaemon-3.png" alt="Buri Buri" class="sticker hidden"
                style="width: 100px; position: absolute; bottom: -50px; right: -20px;">
        </div>

        <!-- Proposal Screen -->
        <div id="screen-proposal" class="screen hidden">
            <h1 class="title">One last question...</h1>
            <h2 class="subtitle">Will you be my Valentine? 🌹</h2>
            <img src="sticker2.png" class="sticker" style="width: 120px; margin-bottom: 20px;">
            <div class="proposal-buttons">
                <button id="btn-yes" class="btn-primary">Yes, Always! 💖</button>
                <button id="btn-no" class="btn-secondary">Not Interested</button>
            </div>
        </div>

        <!-- Celebration Screen -->
        <div id="screen-celebration" class="screen hidden">
            <h1 class="title">YAYYYYY! 🎉</h1>
            <p class="subtitle">Ofc I knew it! Since you my fav girl in entire universe.. kissses <span
                    class="girl-name">Lily</span>! 🩷</p>
            <div class="stickers-container">
                <img src="sticker3.png" class="sticker bounce-anim" style="width: 150px;">
                <img src="zaemon-2.png" class="sticker bounce-anim" style="width: 150px; animation-delay: 0.2s;">
                <img src="zaemon-3.png" class="sticker bounce-anim" style="width: 150px; animation-delay: 0.4s;">
            </div>
            <p class="signature">- <span class="boy-name">Tom</span></p>
            <button class="btn-primary" onclick="restart()">Replay ↺</button>
        </div>
    </div>

    <!-- Scripts -->
    <script type="module" src="script.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
</body>

</html>
